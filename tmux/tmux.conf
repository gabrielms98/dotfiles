# ~/.config/tmux/tmux.conf
# ---------------------------------------------------------------------------
# General / terminal
# ---------------------------------------------------------------------------
set-option -sg escape-time 10
set-option -g focus-events on
set-option -g default-terminal "tmux-256color"
# True color (RGB) passthrough for the outer terminal (Ghostty/xterm)
set-option -as terminal-features ",xterm-256color:RGB"
set-option -as terminal-features ",ghostty:RGB"
# Undercurl + colored underlines, so Neovim LSP squiggles render inside tmux
set-option -as terminal-overrides ",*:Smulx=\\E[4::%p1%dm"
set-option -as terminal-overrides ",*:Setulc=\\E[58::2::%p1%{65536}%/%d::%p2%{256}%/%d::%p3%%d%;m"
set-option -g default-shell /bin/zsh
set -g default-command /bin/zsh

set -g history-limit 100000        # big scrollback
set -g base-index 1                # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on         # keep window numbers gapless
set -g set-clipboard on
set -g detach-on-destroy off       # switch to another session instead of exiting

# Stable window titles: apps can't hijack the name, tmux names by active command
set -g allow-rename off
set -g automatic-rename on
set -g display-panes-time 2000     # keep pane-number overlay (prefix+q) up longer

# vi everywhere
set -g status-keys vi
set -g mode-keys vi

set-option -g mouse on

# ---------------------------------------------------------------------------
# Clipboard (native macOS pbcopy — reattach-to-user-namespace no longer needed)
# ---------------------------------------------------------------------------
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# ---------------------------------------------------------------------------
# Keybindings (prefix stays C-b)
# ---------------------------------------------------------------------------
# Reload config
bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Splits that keep the current working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# prefix + arrows: select panes (your usual muscle memory)
bind Up    select-pane -U
bind Down  select-pane -D
bind Left  select-pane -L
bind Right select-pane -R

# prefix + H/J/K/L: resize panes (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# prefix + f: sessionx — fuzzy session/project switcher (see plugin options below)

# --- Floating popups ---------------------------------------------------------
# prefix + g: scratch shell floating over the current pane
bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "zsh"
# prefix + G: lazygit floating over the current pane
bind G display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# --- Window / pane workflow --------------------------------------------------
# Move the current window left/right in the window list
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1
# Break the active pane into its own window / join one back in
bind b break-pane -d
bind @ choose-tree -Zw "join-pane -s '%%'"
# Toggle synchronize-panes (type once -> send to every pane in the window)
bind S if -F "#{pane_synchronized}" \
  "setw synchronize-panes off ; display-message 'sync-panes: OFF'" \
  "setw synchronize-panes on  ; display-message 'sync-panes: ON'"

# --- which-key style menu (native, no plugin) -> prefix + Space ---------------
bind Space display-menu -T "#[align=centre fg=#7aa2f7]  tmux  " -x C -y C \
  "Sessionizer"        f "run-shell '~/.config/tmux/plugins/tmux-sessionx/scripts/sessionx.sh'" \
  "Scratch shell"      g "display-popup -E -w 80% -h 80% -d '#{pane_current_path}' zsh" \
  "Lazygit"            G "display-popup -E -w 90% -h 90% -d '#{pane_current_path}' lazygit" \
  "" \
  "Split right"        "|" "split-window -h -c '#{pane_current_path}'" \
  "Split down"         "\\" "split-window -v -c '#{pane_current_path}'" \
  "Zoom pane"          z "resize-pane -Z" \
  "Break pane out"     b "break-pane -d" \
  "Sync panes toggle"  S "setw synchronize-panes" \
  "" \
  "New window"         c "new-window -c '#{pane_current_path}'" \
  "Rename window"      , "command-prompt -I '#W' 'rename-window \"%%\"'" \
  "Rename session"     '$' "command-prompt -I '#S' 'rename-session \"%%\"'" \
  "" \
  "Reload config"      R "source-file ~/.config/tmux/tmux.conf ; display-message 'reloaded'" \
  "Detach"             d detach-client

# ---------------------------------------------------------------------------
# Activity / bell monitoring — drives the Claude "done" flag in the status bar
# ---------------------------------------------------------------------------
set -g monitor-bell on
set -g visual-bell on          # convert bell to a status message (no audible beep)
set -g bell-action other       # only flag bells from background windows
set -g monitor-activity off

# ---------------------------------------------------------------------------
# Plugins (TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'Morantron/tmux-fingers'   # prefix+F: hint-copy paths/urls/hashes (brew-installed binary)
set -g @plugin 'laktak/extrakto'          # prefix+Tab: fuzzy-extract any token to clipboard/prompt
set -g @plugin 'omerxx/tmux-sessionx'     # prefix+f: fuzzy session manager w/ preview + zoxide

# vim-tmux-navigator -> use Ctrl+arrows for seamless nvim <-> tmux movement
set -g @vim_navigator_mapping_left  "C-Left"
set -g @vim_navigator_mapping_right "C-Right"
set -g @vim_navigator_mapping_up    "C-Up"
set -g @vim_navigator_mapping_down  "C-Down"
set -g @vim_navigator_mapping_prev  ""

# resurrect / continuum — persist sessions across reboots
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-fingers (prefix+F) — v2 style syntax uses named/256 colors (no hex)
set -g @fingers-key F
set -g @fingers-main-action ':copy:'
set -g @fingers-hint-style 'fg=colour215,bold'
set -g @fingers-highlight-style 'fg=colour236,bg=colour215,bold'

# extrakto (prefix+Tab) — grab tokens from pane output
set -g @extrakto_key 'Tab'
set -g @extrakto_clip_tool 'pbcopy'
set -g @extrakto_split_direction 'p'   # open in a popup
set -g @extrakto_grab_area 'window recent'

# tmux-sessionx (prefix+f) — session manager with live preview + zoxide frecency
set -g @sessionx-bind 'f'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-preview-enabled 'true'
set -g @sessionx-window-height '75%'
set -g @sessionx-window-width '80%'
set -g @sessionx-filter-current 'false'
set -g @sessionx-prompt '  '
set -g @sessionx-pointer '▶ '

# ---------------------------------------------------------------------------
# TokyoNight (storm) status line — hand-rolled, no plugin/font dependency
# ---------------------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-position top
set -g status-justify left

# palette: bg #1f2335  fg #c0caf5  gray #565f89  blue #7aa2f7
#          cyan #7dcfff  magenta #bb9af7  orange #ff9e64  green #9ece6a
set -g status-style "bg=#1f2335,fg=#c0caf5"
set -g status-left-length 40
set -g status-right-length 120

# Left: session name — turns orange while the prefix key is held.
set -g status-left "#[fg=#1f2335,bg=#{?client_prefix,#ff9e64,#7aa2f7},bold] #S #[fg=#{?client_prefix,#ff9e64,#7aa2f7},bg=#1f2335,nobold] "

# Windows: #F shows flags — '!' bell (Claude done), '*' current, '-' last, 'Z' zoom.
set -g window-status-format "#[fg=#565f89,bg=#1f2335] #I:#W#F "
set -g window-status-current-format "#[fg=#1f2335,bg=#7dcfff,bold] #I:#W#F "
set -g window-status-bell-style "fg=#1f2335,bg=#ff9e64,bold"
set -g window-status-separator ""

# Right: just the current directory (no clock, no date).
set -g status-right "#[fg=#1f2335,bg=#7aa2f7,bold] #{b:pane_current_path} "

# Panes / messages — prominent borders with a per-pane title bar
set -g pane-border-lines heavy
set -g pane-border-indicators both
set -g pane-border-status top
set -g pane-border-format " #[bold]#P #{pane_current_command} #[nobold]#{?pane_active,#[fg=#7aa2f7],#[fg=#565f89]}"
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#7aa2f7,fg=#1f2335,bold"
set -g mode-style "bg=#7aa2f7,fg=#1f2335"

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
